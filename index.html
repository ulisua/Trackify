<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trackify</title>

<link rel="stylesheet" href="styles.css">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="navbar">
    <div class="logo">💰 Trackify</div>
    <div class="user">Hola, <span id="usuarioNombre">Usuario</span></div>
</header>

<div class="layout">

<aside class="sidebar">
    <nav>
        <a class="active">Dashboard</a>
        <a>Ingresos</a>
        <a>Gastos</a>
        <a>Categorías</a>
        <a>Objetivos</a>
        <a>Perfil</a>
    </nav>
</aside>

<main class="content">

<!-- CARDS -->
<section class="cards">
    <div class="card">
        <h4>Ingresos</h4>
        <p id="ingresos">$0</p>
    </div>
    <div class="card highlight">
        <h4>Balance</h4>
        <p id="balance">$0</p>
    </div>
    <div class="card">
        <h4>Gastos</h4>
        <p id="gastos">$0</p>
    </div>
</section>

<section class="cards small">
    <div class="card">% gasto <p id="porcentaje">0%</p></div>
    <div class="card">Mayor categoría <p id="categoriaTop">-</p></div>
    <div class="card">Gasto mensual <p id="gastoMensual">$0</p></div>
</section>

<!-- GRAFICOS -->
<section class="graficos">
    <div class="grafico-box">
        <canvas id="graficoTorta"></canvas>
    </div>
    <div class="grafico-box">
        <canvas id="graficoBarras"></canvas>
    </div>
</section>

<!-- BOTONES -->
<div class="acciones">
    <button class="btn ingreso" onclick="abrirModal('ingreso')">+ Ingreso</button>
    <button class="btn gasto" onclick="abrirModal('gasto')">+ Gasto</button>
    <button class="btn objetivo" onclick="abrirModal('objetivo')">+ Objetivo</button>
</div>

<!-- GRID -->
<section class="grid">
    <div class="box">
        <h3>Movimientos</h3>
        <ul id="movimientos"></ul>
    </div>

    <div class="box">
        <h3>Recomendaciones IA</h3>
        <p id="recomendacion"></p>
    </div>
</section>

<!-- CHAT -->
<section class="chat">
    <h3>Preguntale a la IA</h3>
    <textarea id="pregunta" placeholder="Preguntale a la IA..."></textarea>
    <button class="btn" onclick="preguntarIA()">Enviar</button>
    <div id="chatRespuestas"></div>
</section>

</main>
</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
    <div class="modal-content">
        <h3 id="modalTitulo"></h3>

        <input type="number" id="monto" placeholder="Monto">
        <input type="date" id="fecha">
        <input type="text" id="extra" placeholder="Descripción / Categoría">

        <div class="modal-actions">
            <button class="btn" onclick="guardar()">Guardar</button>
            <button class="btn cancel" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>
</div>

<footer class="footer">
    <p>Trackify © 2026</p>
</footer>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/graficos.js"></script>
<script src="js/ia.js"></script>

</body>
</html>
